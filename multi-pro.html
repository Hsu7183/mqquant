<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <meta http-equiv="Referrer-Policy" content="no-referrer" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="format-detection" content="telephone=no,email=no,address=no" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self' https://cdn.jsdelivr.net;
             style-src 'self' 'unsafe-inline';
             img-src 'self' data:;
             connect-src 'self';
             font-src 'self' data:;
             media-src 'none';
             object-src 'none';
             frame-src 'none';
             worker-src 'none';
             child-src 'none';
             frame-ancestors 'none';
             base-uri 'none';
             form-action 'self';
             upgrade-insecure-requests;
             block-all-mixed-content">
  <title>MQ Quant 期貨最佳化參數研究</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC",
                   "Microsoft JhengHei", sans-serif;
      background: #f5f5f5;
      padding: 8px;
      -webkit-font-smoothing: antialiased;
    }

    body.secure-pending .wrap {
      visibility: hidden;
    }

    body.security-blocked {
      margin: 0;
      min-height: 100vh;
      padding: 0;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }

    body.security-blocked .wrap {
      display: none;
    }

    .security-shield {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(10px);
    }

    body.security-blocked .security-shield,
    body.secure-pending .security-shield {
      display: flex;
    }

    .security-shield-card {
      width: min(520px, 100%);
      padding: 28px 24px;
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(15, 23, 42, 0.96);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
      color: #e2e8f0;
    }

    .security-shield-kicker {
      margin: 0 0 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .22em;
      color: #93c5fd;
    }

    .security-shield-title {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 900;
      color: #f8fafc;
    }

    .security-shield-text {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.8;
      color: #cbd5e1;
    }

    .security-shield-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .security-shield-actions .btn {
      padding: 8px 14px;
      font-size: 13px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 6px 0;
      text-align: center;
    }

    .muted {
      color: #666;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .top-row {
      max-width: 1200px;
      margin: 0 auto 4px auto;
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: stretch;
    }

    .toolbar {
      flex: 1 1 auto;
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      overflow-x: auto;
      background: #fff;
      border-radius: 4px;
      border: 1px solid #ddd;
      padding: 6px 8px;
    }

    .toolbar label {
      white-space: nowrap;
    }

    .toolbar input[type="number"] {
      width: 90px;
      font-size: 12px;
      padding: 1px 2px;
      margin-left: 3px;
    }

    .toolbar input[type="file"] {
      font-size: 12px;
    }

    .toolbar button {
      font-size: 12px;
      padding: 2px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    .status-line {
      max-width: 1200px;
      margin: 2px auto 6px auto;
      font-size: 11px;
      color: #555;
    }

    .card {
      max-width: 1200px;
      margin: 4px auto;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ddd;
      padding: 8px;
      box-sizing: border-box;
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .chart-main-with-range {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .equity-range-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-height: 24px;
    }

    .range-group-tabs,
    .range-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .range-group-tab,
    .range-chip,
    .equity-range-reset,
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: #fff;
      color: #1f2937;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: all .15s ease;
      text-decoration: none;
    }

    .range-chip {
      padding: 0 12px;
    }

    .range-group-tab.is-active,
    .range-chip.is-active,
    .equity-range-reset.is-active {
      background: #2f5ed9;
      border-color: #2f5ed9;
      color: #fff;
    }

    .range-chip:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .equity-period-note {
      display: none;
    }

    .chart-box {
      width: 100%;
      height: 360px;
    }

    .chart-box canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    .table-wrapper {
      max-width: 1200px;
      margin: 4px auto;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ddd;
      padding: 4px;
      box-sizing: border-box;
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1080px;
      font-size: 12px;
    }

    thead {
      background: #fafafa;
    }

    th, td {
      padding: 4px 6px;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    th {
      text-align: center;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    th.sortable:hover {
      background: #f0f0f0;
    }

    th[data-sort-dir="asc"]::after {
      content: " ▲";
      font-size: 10px;
    }

    th[data-sort-dir="desc"]::after {
      content: " ▼";
      font-size: 10px;
    }

    td {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    td:first-child {
      text-align: center;
    }

    td:nth-child(2) {
      text-align: left;
      max-width: 420px;
    }

    tbody tr:nth-child(even) {
      background: #fcfcfc;
    }

    .score-badge {
      display: inline-block;
      min-width: 46px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
    }

    .score-strong {
      background: #ffe5e5;
      color: #e60000;
      border: 1px solid #ffb3b3;
    }

    .score-adequate {
      background: #fff9db;
      color: #c9a500;
      border: 1px solid #ffe58f;
    }

    .score-improve {
      background: #e7f7e7;
      color: #008000;
      border: 1px solid #a3e6a3;
    }

    .rating-strong  { background:#ffe5e5; color:#e60000; font-weight:600; }
    .rating-adequate{ background:#fff9db; color:#c9a500; font-weight:600; }
    .rating-improve { background:#e7f7e7; color:#008000; font-weight:600; }

    .hint {
      font-size: 11px;
      color: #777;
      max-width: 1200px;
      margin: 0 auto;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="secure-pending">
  <div id="securityShield" class="security-shield" aria-live="polite" aria-hidden="true"></div>

  <div class="wrap">
    <h1>MQ Quant 期貨最佳化參數研究</h1>
    <div class="muted">一次載入多個期貨 TXT，按照單檔 KPI 邏輯計算分數，並顯示目前最佳版本的資產曲線。</div>

    <div class="top-row">
      <div class="toolbar">
        <label>
          本金：
          <input type="number" id="capitalInput" value="1000000" step="10000" />
        </label>
        <label>
          滑點（每邊點數）：
          <input type="number" id="slipInput" value="0" step="0.1" />
        </label>
        <label>
          TXT 檔（可多選）：
          <input type="file" id="fileInput" accept=".txt,.TF_1m" multiple />
        </label>
        <button id="runBtn" class="btn" type="button" disabled>計算</button>
      </div>
    </div>

    <div class="status-line" id="statusLine">
      說明：一次可選擇多個期貨 TXT（含 INPOS），將依單檔分析的 KPI 與分數邏輯計算。
    </div>

    <div class="card chart-main-with-range">
      <div class="card-title" id="chartTitle">頂檔資產曲線（含滑價累積損益）</div>
      <div class="equity-range-inline">
        <div class="range-group-tabs" id="periodGroupTabs">
          <button type="button" class="range-group-tab is-active" data-range-group="week">週</button>
          <button type="button" class="range-group-tab" data-range-group="month">月</button>
          <button type="button" class="range-group-tab" data-range-group="year">年</button>
          <button type="button" class="equity-range-reset is-active" id="perf-resetBtn">全部</button>
        </div>
        <div class="range-chip-list" id="periodChipList"></div>
        <div class="equity-period-note" id="equityPeriodNote" aria-live="polite"></div>
      </div>
      <div class="chart-box"><canvas id="scoreChart"></canvas></div>
    </div>

    <div class="table-wrapper">
      <table id="resultTable">
        <thead>
          <tr>
            <th class="sortable" data-key="dateTag">時間標記</th>
            <th>參數值</th>
            <th class="sortable" data-key="score">分數</th>
            <th class="sortable" data-key="cagr">CAGR</th>
            <th class="sortable" data-key="totalReturn">總報酬</th>
            <th class="sortable" data-key="maxDdPct">MaxDD%</th>
            <th class="sortable" data-key="pf">PF</th>
            <th class="sortable" data-key="winRate">Hit%</th>
            <th class="sortable" data-key="sharpe">Sharpe</th>
            <th class="sortable" data-key="sortino">Sortino</th>
            <th class="sortable" data-key="calmar">Calmar</th>
            <th class="sortable" data-key="riskOfRuin">風險</th>
            <th class="sortable" data-key="costRatio">成本比</th>
            <th class="sortable" data-key="nTrades">筆數</th>
            <th class="sortable" data-key="avgTrade">平均損益</th>
            <th class="sortable" data-key="worstDay">最差日</th>
            <th class="sortable" data-key="worstWeek">最差週</th>
            <th class="sortable" data-key="ulcer">Ulcer</th>
            <th class="sortable" data-key="recoveryFactor">Recovery</th>
            <th class="sortable" data-key="turnover">Turnover</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="0807-security.js?v=20260412-sec03"></script>
  <script src="multi-pro.js?v=20260412-range02"></script>
  <script src="multi-pro-page.js?v=20260412-range01"></script>
</body>
</html>
